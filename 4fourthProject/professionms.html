<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profession Management System</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <div class="main">
        <h2>New Employees</h2>
        <form>
            <div class="form">
                <div class="ipname">
                    <label for="Name">Enter Name</label><br>
                    <input type="text" name="Name" id="name" placeholder="Enter Name">
                </div>
                <div class="profession">
                    <label for="profession">Enter Profession</label><br>
                    <input type="text" name="profession" id="profession" placeholder="Enter Profession">
                </div>
                <div class="ipage">
                    <label for="age">Enter Age</label><br>
                    <input type="number" name="age" id="age" placeholder="Enter Age">
                </div>
            </div>
                <button type="submit" id="btn">Add User</button>
            </form>
        <div class="errorNsuccess">
            <p>Error :Please Make sure All the field before adding in an emplyee</p>
        </div>
        <div class="employessdata">
            <p>Added Emplyees</p>

        </div>
    </div>
    <script src="script4.js"></script>
</body>
</html>
